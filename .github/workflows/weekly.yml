name: Build weekly player feed

on:
  schedule:
    - cron: "0 10 * * 1"   # Mondays 10:00 UTC (~6:00 AM ET) — adjust if you like
  workflow_dispatch: {}     # allows manual run from the Actions tab

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build latest week files
        run: python build_week.py
        
      - name: Commit & push
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add latest_week.json meta.json week_*.json season_totals.json season_top10.json || true
          git commit -m "Update weekly & season feeds" || echo "Nothing to commit"
          git push
