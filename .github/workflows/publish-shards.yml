name: Build & Publish Shards
on:
  workflow_dispatch:
    inputs:
      season:
        description: "Season (e.g., 2025)"
        required: true
        default: "2025"
      week:
        description: "Week number (e.g., 3)"
        required: true
        default: "3"
      raw_season_path:
        description: "Path to season totals JSON"
        required: true
        default: "raw/season_totals_2025.json"
      raw_weekly_path:
        description: "Path to weekly usage JSON"
        required: true
        default: "raw/weekly_usage_2025_w03.json"

  schedule:
    - cron: "0 9 * * TUE"   # optional: auto-run Tuesdays 9:00 UTC

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build shards
        env:
          SEASON: ${{ github.event.inputs.season || '2025' }}
          WEEK: ${{ github.event.inputs.week || '3' }}
          RAW_SEASON: ${{ github.event.inputs.raw_season_path || 'raw/season_totals_2025.json' }}
          RAW_WEEKLY: ${{ github.event.inputs.raw_weekly_path || 'raw/weekly_usage_2025_w03.json' }}
        run: |
          python -m pip install --upgrade pip
          python scripts/build_shards.py

      - name: Commit public shards
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@users.noreply.github.com"
          git add public/
          git commit -m "Publish shards: s${{ env.SEASON }} w${{ env.WEEK }}" || echo "No changes"
          git push
